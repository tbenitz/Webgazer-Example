<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

  <!-- WebGazer & jsPsych-WebGazer extension (use a known working version) -->
  <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@7.0.0/examples/js/webgazer/webgazer.js"></script>
  <script src="https://unpkg.com/@jspsych/extension-webgazer@1.1.3"></script>

  <!-- Plugins you need -->
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-webgazer-init-camera@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-webgazer-calibrate@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-webgazer-validate@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.3"></script>
</head>
<body>
<script>

// Use a real image URL instead of missing 'img/blue.png'
var preload = {
  type: 'preload',
  images: ['https://via.placeholder.com/400x300/0000FF/FFFFFF?text=Look+Here']
};

var camera_instructions = {
  type: 'html-button-response',
  stimulus: `
    <p>Allow camera access to continue (needed for eye tracking).</p>
    <p>It may take 20–30 seconds to start.</p>
  `,
  choices: ['Got it']
};

var init_camera = { type: 'webgazer-init-camera' };

var calibration_instructions = {
  type: 'html-button-response',
  stimulus: `
    <p>Calibration: Look at each dot and **click** it.</p>
  `,
  choices: ['Start calibration']
};

var calibration = {
  type: 'webgazer-calibrate',
  calibration_points: [[25,25], [75,25], [50,50], [25,75], [75,75]],
  repetitions_per_point: 2,
  randomize_calibration_order: true
};

var validation_instructions = {
  type: 'html-button-response',
  stimulus: `
    <p>Validation: Just **look** at each dot (no clicking needed).</p>
  `,
  choices: ['Start validation']
};

var validation = {
  type: 'webgazer-validate',
  validation_points: [[25,25], [75,25], [50,50], [25,75], [75,75]],
  roi_radius: 200,
  time_to_saccade: 1000,
  validation_duration: 2000,
  data: { task: 'validate' }
};

var recalibrate = {
  timeline: [recalibrate_instructions, calibration, validation_instructions, validation],
  conditional_function: function() {
    var vd = jsPsych.data.get().filter({task: 'validate'}).values()[0];
    return vd.percent_in_roi.some(x => x < 50);
  }
};

var calibration_done = {
  type: 'html-button-response',
  stimulus: `<p>Calibration finished!</p>`,
  choices: ['Continue']
};

var begin = {
  type: 'html-keyboard-response',
  stimulus: `<p>Next you'll see a blue square.<br>Just look at it for 2 seconds.<br>Press any key to begin.</p>`
};

var trial = {
  type: 'image-keyboard-response',
  stimulus: 'https://via.placeholder.com/400x300/0000FF/FFFFFF?text=Look+Here+(Blue)',
  choices: jsPsych.NO_KEYS,
  trial_duration: 2000,
  extensions: [
    {
      type: 'webgazer',
      params: { targets: ['#jspsych-image-keyboard-response-stimulus'] }
    }
  ]
};

var show_data = {
  type: 'html-keyboard-response',
  stimulus: function() {
    let d = jsPsych.data.getLastTrialData().values()[0];
    return `<pre>${JSON.stringify(d, null, 2)}</pre>`;
  },
  choices: jsPsych.NO_KEYS
};

jsPsych.init({
  timeline: [
    preload,
    camera_instructions,
    init_camera,
    calibration_instructions,
    calibration,
    validation_instructions,
    validation,
    recalibrate,
    calibration_done,
    begin,
    trial,
    show_data
  ],
  extensions: [{ type: 'webgazer' }]
});

</script>
</body>
</html>
